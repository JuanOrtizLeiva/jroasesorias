<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JRO Asesorías - Próximamente</title>
    <!-- Carga de Tailwind CSS para un diseño rápido y moderno -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Carga de la fuente Inter de Google Fonts para una mejor tipografía -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Estilo para aplicar la fuente Inter al cuerpo del documento */
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-gray-100">

    <!-- Contenedor principal que centra el contenido vertical y horizontalmente -->
    <div class="flex items-center justify-center min-h-screen">
        
        <!-- Tarjeta de contenido con sombra y bordes redondeados -->
        <div class="w-full max-w-lg p-8 mx-4 text-center bg-white rounded-lg shadow-md border border-gray-200">
            
            <!-- Logo o Nombre de la Empresa -->
            <h1 class="text-4xl font-bold text-gray-800 tracking-tight">
                JRO Asesorías
            </h1>
            
            <!-- Mensaje principal -->
            <p class="mt-4 text-lg text-gray-600">
                Nuestro nuevo sitio web está en construcción.
            </p>
            
            <!-- Mensaje secundario -->
            <p class="mt-2 text-3xl font-semibold text-teal-600 animate-pulse">
                ¡Próximamente!
            </p>
            
            <!-- Separador visual -->
            <div class="my-6 border-t border-gray-200"></div>
            
            <!-- Información de contacto -->
            <p class="text-gray-500">
                Mientras tanto, puedes contactarnos en:
            </p>
            <a href="mailto:contacto@jroasesorias.cl" class="mt-1 inline-block font-medium text-teal-600 hover:text-teal-700 transition-colors">
                contacto@jroasesorias.cl
            </a>
            
        </div>
        
    </div>

</body>
</html>
